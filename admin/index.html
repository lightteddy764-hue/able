<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ABLE</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .login-box{background:white;padding:2.5rem;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.08);width:100%;max-width:380px;margin:1rem}
        h1{font-size:1.5rem;margin-bottom:0.5rem;color:#111}
        p{font-size:0.85rem;color:#666;margin-bottom:1.5rem}
        label{font-size:0.8rem;font-weight:600;color:#333;display:block;margin-bottom:0.3rem}
        input{width:100%;padding:0.75rem 1rem;border:1.5px solid #ddd;border-radius:8px;font-size:0.9rem;margin-bottom:1rem;outline:none;transition:border 0.3s}
        input:focus{border-color:#E67E22}
        button{width:100%;padding:0.85rem;background:#E67E22;color:white;border:none;border-radius:8px;font-weight:700;font-size:0.9rem;cursor:pointer;transition:background 0.3s}
        button:hover{background:#d35400}
        .error{color:#ef4444;font-size:0.8rem;margin-bottom:1rem;display:none}
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Admin Panel</h1>
        <p>ABLE Wellness Platform</p>
        <div class="error" id="error">Invalid credentials</div>
        <form id="adminLogin">
            <label>Username</label>
            <input type="text" id="user" placeholder="admin" required>
            <label>Password</label>
            <input type="password" id="pass" placeholder="••••••" required>
            <button type="submit">Login</button>
        </form>
    </div>
    <script>
    document.getElementById('adminLogin').addEventListener('submit', async(e) => {
        e.preventDefault();
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        const res = await fetch('/admin/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user,pass}) });
        const data = await res.json();
        if (data.token) { localStorage.setItem('adminToken', data.token); window.location.href='/admin/dashboard.html'; }
        else { document.getElementById('error').style.display='block'; }
    });
    </script>
</body>
</html>
