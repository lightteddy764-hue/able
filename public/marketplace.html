<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Marketplace - ABLE</title>
    <link rel="stylesheet" href="dashboard-styles.css">
    <link rel="stylesheet" href="/loader.css">
    <style>
        .mp-page { padding: 0 2rem 4rem; max-width: 1200px; margin: 0 auto; padding-top: 1.5rem; }
        .mp-hero { background: linear-gradient(135deg, #E67E22, #F59E0B); border-radius: 20px; padding: 2.5rem; margin-bottom: 2rem; color: white; position: relative; overflow: hidden; }
        .mp-hero::after { content: ''; position: absolute; top: -30%; right: -10%; width: 300px; height: 300px; background: rgba(255,255,255,0.08); border-radius: 50%; }
        .mp-hero h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.4rem; }
        .mp-hero p { font-size: 0.92rem; opacity: 0.92; max-width: 500px; }
        .mp-search-row { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .mp-search { flex: 1; min-width: 220px; padding: 0.85rem 1.25rem; border: 1.5px solid #E5E7EB; border-radius: 12px; font-size: 0.9rem; outline: none; background: white; }
        .mp-search:focus { border-color: #E67E22; box-shadow: 0 0 0 3px rgba(230,126,34,0.1); }
        .mp-city-input { width: 180px; padding: 0.85rem 1rem; border: 1.5px solid #E5E7EB; border-radius: 12px; font-size: 0.9rem; outline: none; }
        .mp-cats { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .mp-cat { padding: 0.5rem 1rem; border: 1.5px solid #E5E7EB; border-radius: 100px; font-size: 0.78rem; font-weight: 600; cursor: pointer; background: white; transition: all 0.2s; }
        .mp-cat:hover { border-color: #E67E22; color: #E67E22; }
        .mp-cat.active { background: #E67E22; color: white; border-color: #E67E22; }
        .mp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.25rem; }
        .mp-card { background: white; border-radius: 16px; border: 1px solid #E5E7EB; overflow: hidden; transition: all 0.3s; cursor: pointer; }
        .mp-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.08); }
        .mp-card-img { height: 160px; background: linear-gradient(135deg, #FAF7F2, #F3E8FF); display: flex; align-items: center; justify-content: center; font-size: 3rem; overflow: hidden; }
        .mp-card-img img { width: 100%; height: 100%; object-fit: cover; }
        .mp-card-body { padding: 1.25rem; }
        .mp-card-type { font-size: 0.68rem; font-weight: 700; color: #E67E22; background: #FEF3E2; padding: 0.2rem 0.6rem; border-radius: 100px; display: inline-block; margin-bottom: 0.5rem; text-transform: uppercase; }
        .mp-card-body h3 { font-size: 1rem; font-weight: 700; color: #111827; margin-bottom: 0.3rem; }
        .mp-card-loc { font-size: 0.78rem; color: #6B7280; margin-bottom: 0.5rem; }
        .mp-card-desc { font-size: 0.82rem; color: #6B7280; line-height: 1.5; margin-bottom: 0.75rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .mp-card-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
        .mp-card-tags span { font-size: 0.68rem; background: #F3F4F6; color: #374151; padding: 0.2rem 0.5rem; border-radius: 6px; }
        .mp-card-footer { display: flex; align-items: center; justify-content: space-between; }
        .mp-card-price { font-size: 0.72rem; font-weight: 700; color: #10B981; text-transform: capitalize; }
        .mp-card-rating { font-size: 0.72rem; color: #F59E0B; font-weight: 700; }
        .mp-card-btn { padding: 0.5rem 1rem; background: #E67E22; color: white; border: none; border-radius: 8px; font-size: 0.78rem; font-weight: 700; cursor: pointer; }
        .mp-card-btn:hover { background: #D35400; }
        .mp-featured-badge { position: absolute; top: 0.75rem; right: 0.75rem; background: #E67E22; color: white; font-size: 0.6rem; font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 6px; }
        .mp-empty { text-align: center; padding: 4rem 2rem; color: #9CA3AF; font-size: 0.9rem; }
        .mp-load-more { display: block; margin: 2rem auto 0; padding: 0.75rem 2rem; background: white; border: 1.5px solid #E67E22; color: #E67E22; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
        .mp-load-more:hover { background: #E67E22; color: white; }
        #mpDetailModal { scrollbar-width: none; -ms-overflow-style: none; }
        #mpDetailModal::-webkit-scrollbar { display: none; }
        .mp-submit-cta { display: flex; align-items: center; justify-content: space-between; background: #FEF3E2; border: 1px solid rgba(230,126,34,0.2); border-radius: 16px; padding: 1.25rem 1.75rem; margin-top: 2.5rem; gap: 1rem; flex-wrap: wrap; }
        .mp-submit-cta p { font-size: 0.88rem; color: #92400E; font-weight: 600; }
        .mp-submit-cta a { padding: 0.65rem 1.25rem; background: #E67E22; color: white; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 0.85rem; }
        @media(max-width:768px) { .mp-page { padding: 0 1rem 3rem; } .mp-hero { padding: 1.5rem; } .mp-hero h1 { font-size: 1.3rem; } .mp-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <script src="/loader.js"></script>
    <div id="sidebar"></div>
    <script src="sidebar-nav.js"></script>
    <div class="main-content">
        <header class="topbar">
            <button class="menu-toggle" id="menuToggle"><svg viewBox="0 0 24 24" fill="none"><path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            <div class="search-bar"><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><input type="text" placeholder="Search therapists, resources, articles... (⌘K)"></div>
            <div class="topbar-actions">
                <button class="icon-button"><svg viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="notification-badge">3</span></button>
                <div class="user-profile"><img src="https://ui-avatars.com/api/?name=User&background=E67E22&color=fff" alt="User"><div class="user-info"><span class="user-name">User</span><span class="user-role">Wellness Seeker</span></div></div>
            </div>
        </header>
        <main class="mp-page">
            <div class="mp-hero">
                <h1>🏪 Wellness Marketplace</h1>
                <p>Discover trusted wellness services, spaces, and support near you.</p>
            </div>
            <div class="mp-search-row">
                <input type="text" class="mp-search" id="mpSearch" placeholder="Search spa, yoga, therapy, nutrition...">
                <input type="text" class="mp-city-input" id="mpCity" placeholder="City (optional)">
            </div>
            <div class="mp-cats" id="mpCats"></div>
            <div class="mp-grid" id="mpGrid"><div class="mp-empty">Loading marketplace...</div></div>
            <button class="mp-load-more" id="mpLoadMore" style="display:none">Load More</button>
            <div class="mp-submit-cta">
                <p>Are you a licensed wellness professional? List your clinic or service on ABLE.</p>
                <a href="/professional/login.html">Professional Portal →</a>
            </div>
        </main>
    </div>

<script>
const TYPES = {all:'All',spa:'Spa',mental_health_center:'Mental Health',therapy_clinic:'Therapy Clinics',yoga_studio:'Yoga',meditation_center:'Meditation',fitness_wellness:'Fitness',nutrition_store:'Nutrition',wellness_product_store:'Wellness Stores',professional_service:'Professional Services'};
let currentType = 'all', currentPage = 1, totalPages = 1;

// Render category chips
document.getElementById('mpCats').innerHTML = Object.entries(TYPES).map(([k,v]) =>
    `<button class="mp-cat${k==='all'?' active':''}" data-type="${k}">${v}</button>`
).join('');

document.getElementById('mpCats').addEventListener('click', e => {
    const btn = e.target.closest('.mp-cat');
    if (!btn) return;
    document.querySelectorAll('.mp-cat').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    currentType = btn.dataset.type;
    currentPage = 1;
    loadListings();
});

let searchTimer;
document.getElementById('mpSearch').addEventListener('input', () => { clearTimeout(searchTimer); searchTimer = setTimeout(() => { currentPage = 1; loadListings(); }, 400); });
document.getElementById('mpCity').addEventListener('input', () => { clearTimeout(searchTimer); searchTimer = setTimeout(() => { currentPage = 1; loadListings(); }, 400); });
document.getElementById('mpLoadMore').addEventListener('click', () => { currentPage++; loadListings(true); });

async function loadListings(append = false) {
    const search = document.getElementById('mpSearch').value.trim();
    const city = document.getElementById('mpCity').value.trim();
    let url = `/api/marketplace?page=${currentPage}&limit=12`;
    if (currentType !== 'all') url += `&type=${currentType}`;
    if (search) url += `&search=${encodeURIComponent(search)}`;
    if (city) url += `&city=${encodeURIComponent(city)}`;

    try {
        const res = await fetch(url);
        const data = await res.json();
        totalPages = data.pages || 1;
        const grid = document.getElementById('mpGrid');
        const html = (data.listings || []).map(renderCard).join('');
        if (append) { grid.insertAdjacentHTML('beforeend', html); }
        else { grid.innerHTML = html || '<div class="mp-empty">No listings found. Try a different search or category.</div>'; }
        document.getElementById('mpLoadMore').style.display = currentPage < totalPages ? 'block' : 'none';
    } catch (e) {
        document.getElementById('mpGrid').innerHTML = '<div class="mp-empty">Error loading marketplace</div>';
    }
}

function renderCard(l) {
    const img = l.images && l.images[0]
        ? `<img src="${l.images[0]}" alt="${esc(l.businessName)}" loading="lazy">`
        : `<span>${typeIcon(l.listingType)}</span>`;
    const city = l.location?.city ? `📍 ${esc(l.location.city)}${l.location.state ? ', '+esc(l.location.state) : ''}` : '';
    const tags = (l.services || []).slice(0, 3).map(s => `<span>${esc(s)}</span>`).join('');
    const rating = l.rating ? `<span class="mp-card-rating">⭐ ${l.rating} (${l.reviewCount || 0})</span>` : '';
    return `<a href="marketplace-listing.html?id=${l._id}" class="mp-card" style="position:relative;text-decoration:none;color:inherit">
        ${l.isFeatured ? '<span class="mp-featured-badge">⭐ Featured</span>' : ''}
        <div class="mp-card-img">${img}</div>
        <div class="mp-card-body">
            <span class="mp-card-type">${TYPES[l.listingType] || l.listingType}</span>
            <h3>${esc(l.businessName)}</h3>
            ${city ? `<div class="mp-card-loc">${city}</div>` : ''}
            <p class="mp-card-desc">${esc(l.description)}</p>
            ${tags ? `<div class="mp-card-tags">${tags}</div>` : ''}
            <div class="mp-card-footer">
                <div>${rating}${l.priceRange && l.priceRange !== 'unknown' ? `<span class="mp-card-price" style="margin-left:0.5rem">💰 ${l.priceRange}</span>` : ''}</div>
                <span class="mp-card-btn">View & Book</span>
            </div>
        </div>
    </a>`;
}

function typeIcon(t) {
    const icons = {spa:'🧖',mental_health_center:'🧠',therapy_clinic:'💚',yoga_studio:'🧘',meditation_center:'🕯️',fitness_wellness:'💪',nutrition_store:'🥗',wellness_product_store:'🛍️',professional_service:'👩‍⚕️',other:'✨'};
    return icons[t] || '✨';
}

function esc(s) { return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function openListing(id) {
    try {
        const res = await fetch('/api/marketplace/' + id);
        const l = await res.json();
        if (l.error) return;
        const existing = document.getElementById('mpDetailModal');
        if (existing) existing.remove();

        const m = document.createElement('div');
        m.id = 'mpDetailModal';
        m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none';
        m.addEventListener('click', e => { if (e.target === m) m.remove(); });

        const img = l.images && l.images[0] ? `<img src="${l.images[0]}" style="width:100%;height:200px;object-fit:cover;border-radius:12px;margin-bottom:1rem">` : '';
        const services = (l.services||[]).map(s => `<span style="padding:0.3rem 0.6rem;background:#F3F4F6;border-radius:6px;font-size:0.75rem">${esc(s)}</span>`).join(' ');
        const hours = (l.openingHours||[]).map(h => `<div style="display:flex;justify-content:space-between;font-size:0.78rem;padding:0.2rem 0"><span>${h.day}</span><span>${h.isClosed ? 'Closed' : (h.open+' - '+h.close)}</span></div>`).join('');
        const prof = l.linkedProfessionalId ? `<div style="margin-top:1rem;padding:0.75rem;background:#F9FAFB;border-radius:10px;font-size:0.82rem"><strong>Linked Professional:</strong> ${esc(l.linkedProfessionalId.fullName)} — ${esc(l.linkedProfessionalId.title||'')}</div>` : '';
        const contact = l.contact || {};
        const minDate = new Date().toISOString().slice(0,10);

        m.innerHTML = `<div style="background:white;border-radius:20px;max-width:620px;width:100%;max-height:85vh;overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none;padding:2rem;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.2);margin:auto">
            <style>#mpDetailModal>div::-webkit-scrollbar{display:none}</style>
            <button id="mpDetailClose" style="position:absolute;top:1rem;right:1.25rem;background:#F3F4F6;border:none;width:32px;height:32px;border-radius:50%;font-size:1rem;cursor:pointer;color:#6B7280">✕</button>
            ${img}
            <span style="font-size:0.68rem;font-weight:700;color:#E67E22;background:#FEF3E2;padding:0.2rem 0.6rem;border-radius:100px;text-transform:uppercase">${TYPES[l.listingType]||l.listingType}</span>
            ${l.isFeatured ? '<span style="font-size:0.65rem;background:#FEF3C7;color:#92400E;padding:0.2rem 0.5rem;border-radius:4px;margin-left:0.5rem;font-weight:700">⭐ Featured</span>' : ''}
            <h2 style="font-size:1.4rem;font-weight:800;color:#111827;margin:0.75rem 0 0.3rem">${esc(l.businessName)}</h2>
            ${l.location?.city ? `<p style="font-size:0.82rem;color:#6B7280;margin-bottom:1rem">📍 ${esc(l.location.address||'')} ${esc(l.location.city)}, ${esc(l.location.state||'')} ${esc(l.location.country||'')}</p>` : ''}
            <p style="font-size:0.9rem;color:#374151;line-height:1.7;margin-bottom:1rem;white-space:pre-wrap">${esc(l.description)}</p>
            ${services ? `<div style="margin-bottom:1rem"><strong style="font-size:0.8rem">Services:</strong><div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.4rem">${services}</div></div>` : ''}
            ${hours ? `<div style="margin-bottom:1rem;padding:0.75rem;background:#F9FAFB;border-radius:10px"><strong style="font-size:0.8rem;display:block;margin-bottom:0.4rem">Opening Hours</strong>${hours}</div>` : ''}
            ${l.priceRange && l.priceRange !== 'unknown' ? `<p style="font-size:0.82rem;margin-bottom:0.75rem"><strong>Price Range:</strong> <span style="color:#10B981;font-weight:700;text-transform:capitalize">${l.priceRange}</span></p>` : ''}
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:1rem">
                ${contact.phone ? `<a href="tel:${contact.phone}" style="padding:0.6rem 1rem;background:#E67E22;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:0.82rem">📞 Call</a>` : ''}
                ${contact.whatsapp ? `<a href="https://wa.me/${contact.whatsapp}" target="_blank" style="padding:0.6rem 1rem;background:#25D366;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:0.82rem">💬 WhatsApp</a>` : ''}
                ${contact.website ? `<a href="${contact.website}" target="_blank" style="padding:0.6rem 1rem;background:#3B82F6;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:0.82rem">🌐 Website</a>` : ''}
                ${contact.email ? `<a href="mailto:${contact.email}" style="padding:0.6rem 1rem;background:#6B7280;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:0.82rem">✉️ Email</a>` : ''}
            </div>
            ${prof}
            <div style="margin-top:1.5rem;padding:0.75rem;background:#FEF2F2;border-radius:10px;font-size:0.72rem;color:#6B7280;line-height:1.5">
                <strong style="color:#92400E">⚠️ Disclaimer:</strong> ABLE lists marketplace providers for discovery. Please verify details, pricing, and credentials before booking or visiting. ABLE does not guarantee diagnosis, treatment, or emergency care through marketplace listings.
            </div>

            <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:2px solid #F3F4F6">
                <h3 style="font-size:1rem;font-weight:800;color:#111827;margin-bottom:1rem">📅 Book an Appointment</h3>
                <div id="mpBookForm" style="display:flex;flex-direction:column;gap:0.75rem">
                    <select id="mpBookService" style="padding:0.7rem 1rem;border:1.5px solid #E5E7EB;border-radius:10px;font-size:0.85rem">
                        <option value="">Select a service (optional)</option>
                        ${(l.services||[]).map(s => '<option value="'+esc(s)+'">'+esc(s)+'</option>').join('')}
                    </select>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem">
                        <input type="date" id="mpBookDate" style="padding:0.7rem;border:1.5px solid #E5E7EB;border-radius:10px;font-size:0.85rem" min="${new Date().toISOString().slice(0,10)}">
                        <input type="time" id="mpBookTime" style="padding:0.7rem;border:1.5px solid #E5E7EB;border-radius:10px;font-size:0.85rem">
                    </div>
                    <textarea id="mpBookNote" placeholder="Any special requests or notes..." rows="2" style="padding:0.7rem;border:1.5px solid #E5E7EB;border-radius:10px;font-size:0.85rem;font-family:inherit;resize:vertical" maxlength="500"></textarea>
                    <div id="mpBookMsg" style="display:none;padding:0.5rem;border-radius:8px;font-size:0.8rem;text-align:center"></div>
                    <button id="mpBookBtn" style="padding:0.85rem;background:#E67E22;color:white;border:none;border-radius:12px;font-size:0.92rem;font-weight:700;cursor:pointer">Send Booking Request</button>
                </div>
            </div>

            <button onclick="reportListing('${l._id}')" style="margin-top:1rem;background:none;border:none;color:#9CA3AF;font-size:0.75rem;cursor:pointer;text-decoration:underline">⚠️ Report this listing</button>
        </div>`;
        document.body.appendChild(m);
        document.getElementById('mpDetailClose').addEventListener('click', () => m.remove());

        // Booking handler
        document.getElementById('mpBookBtn').addEventListener('click', async () => {
            const token = localStorage.getItem('token');
            if (!token) { alert('Please log in to book'); window.location.href = 'login.html'; return; }
            const date = document.getElementById('mpBookDate').value;
            const time = document.getElementById('mpBookTime').value;
            const service = document.getElementById('mpBookService').value;
            const note = document.getElementById('mpBookNote').value;
            const msgEl = document.getElementById('mpBookMsg');
            const btn = document.getElementById('mpBookBtn');
            if (!date) { msgEl.style.display = 'block'; msgEl.style.background = '#FEF2F2'; msgEl.style.color = '#EF4444'; msgEl.textContent = 'Please select a date'; return; }
            btn.disabled = true; btn.textContent = 'Sending...';
            try {
                const res = await fetch('/api/marketplace/' + id + '/book', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ serviceRequested: service, preferredDate: date, preferredTime: time, note })
                });
                const data = await res.json();
                msgEl.style.display = 'block';
                if (res.ok) { msgEl.style.background = '#F0FDF4'; msgEl.style.color = '#10B981'; msgEl.textContent = '✓ ' + data.message; btn.textContent = 'Request Sent ✓'; }
                else { msgEl.style.background = '#FEF2F2'; msgEl.style.color = '#EF4444'; msgEl.textContent = data.error || 'Failed'; btn.disabled = false; btn.textContent = 'Send Booking Request'; }
            } catch(e) { msgEl.style.display = 'block'; msgEl.style.background = '#FEF2F2'; msgEl.style.color = '#EF4444'; msgEl.textContent = 'Network error'; btn.disabled = false; btn.textContent = 'Send Booking Request'; }
        });
    } catch (e) { console.error(e); }
}

function reportListing(id) {
    const token = localStorage.getItem('token');
    if (!token) { alert('Please log in to report'); return; }
    const reason = prompt('Why are you reporting this listing?\n\nOptions: incorrect information, unsafe claim, fake listing, spam, inappropriate content, other');
    if (!reason) return;
    fetch('/api/marketplace/' + id + '/report', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ reason: reason.replace(/ /g, '_').toLowerCase(), details: reason })
    }).then(r => r.json()).then(d => alert(d.message || 'Reported'));
}

// Init
loadListings();
// Set user name
const token = localStorage.getItem('token');
if (token) {
    fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => r.json()).then(d => {
            if (d.name) {
                var nameEl = document.querySelector('.user-name') || document.getElementById('dashUserName');
                if (nameEl) nameEl.textContent = d.name;
                var imgEl = document.querySelector('.user-profile img');
                if (imgEl) {
                    imgEl.src = d.avatar || ('https://ui-avatars.com/api/?name=' + encodeURIComponent(d.name) + '&background=E67E22&color=fff');
                }
            }
        }).catch(() => {});
}
</script>
</body>
</html>
