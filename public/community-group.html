<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Group - ABLE</title>
    <link rel="stylesheet" href="dashboard-styles.css">
    <link rel="stylesheet" href="community.css">
    <style>
        .cg-page { max-width: 760px; margin: 0 auto; padding: 1.5rem; }
        .cg-back { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; color: #6B7280; text-decoration: none; margin-bottom: 1.25rem; font-weight: 600; }
        .cg-back:hover { color: #E67E22; }
        .cg-header { margin-bottom: 1.5rem; }
        .cg-badges { display: flex; gap: 0.4rem; margin-bottom: 0.75rem; }
        .cg-badge { font-size: 0.68rem; font-weight: 700; padding: 0.25rem 0.6rem; border-radius: 100px; }
        .cg-badge-official { background: #FEF3C7; color: #92400E; }
        .cg-badge-cat { background: #F3F4F6; color: #6B7280; }
        .cg-badge-circle { background: #D1FAE5; color: #065F46; }
        .cg-title { font-size: 1.6rem; font-weight: 800; color: #111827; margin-bottom: 0.4rem; }
        .cg-desc { font-size: 0.9rem; color: #6B7280; line-height: 1.6; margin-bottom: 1rem; }
        .cg-meta { display: flex; gap: 1.25rem; flex-wrap: wrap; font-size: 0.82rem; color: #6B7280; padding-bottom: 1rem; border-bottom: 1px solid #F3F4F6; margin-bottom: 1.25rem; }
        .cg-rules { padding: 1rem; background: #FFF8F0; border-radius: 12px; border: 1px solid rgba(230,126,34,0.15); margin-bottom: 1.5rem; }
        .cg-rules strong { font-size: 0.82rem; color: #92400E; display: block; margin-bottom: 0.3rem; }
        .cg-rules p { font-size: 0.82rem; color: #6B7280; line-height: 1.5; white-space: pre-wrap; }
        .cg-join-btn { padding: 0.7rem 1.5rem; background: #E67E22; color: white; border: none; border-radius: 10px; font-weight: 700; font-size: 0.88rem; cursor: pointer; margin-bottom: 1.5rem; }
        .cg-join-btn:hover { background: #D35400; }
        .cg-join-btn:disabled { background: #10B981; cursor: default; }
        .cg-posts-title { font-size: 1.1rem; font-weight: 700; color: #111827; margin-bottom: 1rem; }
        .cg-post { padding: 1.25rem; background: #FAFAFA; border-radius: 14px; border: 1px solid #F3F4F6; margin-bottom: 1rem; }
        .cg-post-pinned { font-size: 0.68rem; color: #E67E22; font-weight: 700; margin-bottom: 0.4rem; }
        .cg-post-badges { display: flex; gap: 0.3rem; margin-bottom: 0.5rem; }
        .cg-post-badge { font-size: 0.65rem; padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: 600; }
        .cg-post-badge-admin { background: #EFF6FF; color: #2563EB; }
        .cg-post-badge-pro { background: #F3E8FF; color: #7C3AED; }
        .cg-post-badge-type { background: #ECFDF5; color: #059669; }
        .cg-post h4 { font-size: 0.95rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.4rem; }
        .cg-post p { font-size: 0.85rem; color: #374151; line-height: 1.7; white-space: pre-wrap; }
        .cg-post-sources { margin-top: 0.75rem; padding: 0.5rem 0.75rem; background: #EFF6FF; border-radius: 6px; font-size: 0.72rem; color: #2563EB; }
        .cg-post-stats { display: flex; gap: 1rem; margin-top: 0.75rem; font-size: 0.78rem; color: #6B7280; }
        .cg-empty { text-align: center; padding: 3rem; color: #9CA3AF; font-size: 0.88rem; }
        @media(max-width:600px) { .cg-title { font-size: 1.3rem; } }
    </style>
</head>
<body>
    <div id="sidebar"></div>
    <script src="sidebar-nav.js"></script>
    <div class="main-content">
        <header class="topbar">
            <button class="menu-toggle" id="menuToggle"><svg viewBox="0 0 24 24" fill="none"><path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            <div class="search-bar"><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><input type="text" placeholder="Search therapists, resources, articles... (⌘K)"></div>
            <div class="topbar-actions">
                <button class="icon-button"><svg viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="notification-badge">3</span></button>
                <div class="user-profile"><img src="https://ui-avatars.com/api/?name=User&background=E67E22&color=fff" alt="User"><div class="user-info"><span class="user-name">User</span><span class="user-role">Wellness Seeker</span></div></div>
            </div>
        </header>
        <main class="cg-page" id="cgPage">
            <a href="community.html" class="cg-back">← Back to Community</a>
            <div style="text-align:center;padding:4rem;color:#9CA3AF">Loading group...</div>
        </main>
    </div>
    <script>
    const token = localStorage.getItem('token');
    function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

    async function loadGroup() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const type = params.get('type') || 'official'; // 'official' or 'circle'

        if (!id) { document.getElementById('cgPage').innerHTML = '<a href="community.html" class="cg-back">← Back</a><p class="cg-empty">No group ID</p>'; return; }

        try {
            let group, posts = [];

            if (type === 'circle') {
                // Fetch circle detail + posts
                const cRes = await fetch('/api/community/circles/' + id);
                const cData = await cRes.json();
                group = cData.circle || { name: params.get('name') || 'Circle', description: '' };
                group.isCircle = true;
                const pRes = await fetch('/api/community/circles/' + id + '/posts');
                const pData = await pRes.json();
                posts = pData.posts || [];
            } else {
                // Official group
                const gRes = await fetch('/api/community/official-groups/' + id);
                group = await gRes.json();
                const pRes = await fetch('/api/community/official-groups/' + id + '/posts');
                const pData = await pRes.json();
                posts = pData.posts || [];
            }

            if (group.error) { document.getElementById('cgPage').innerHTML = '<a href="community.html" class="cg-back">← Back</a><p class="cg-empty">Group not found</p>'; return; }

            document.title = (group.name || group.title || 'Group') + ' - ABLE Community';

            const isCircle = type === 'circle';
            const badges = isCircle
                ? `<span class="cg-badge cg-badge-circle">${group.matchPercent ? group.matchPercent + '% Match · ' : ''}Circle</span>`
                : `<span class="cg-badge cg-badge-official">Official</span><span class="cg-badge cg-badge-cat">${esc(group.category||'')}</span>`;

            const postsHtml = posts.length ? posts.map(p => {
                const authorBadge = p.authorType === 'admin'
                    ? '<span class="cg-post-badge cg-post-badge-admin">Admin</span>'
                    : '<span class="cg-post-badge cg-post-badge-pro">Professional</span>';
                const typeBadge = `<span class="cg-post-badge cg-post-badge-type">${esc(p.contentType||'post')}</span>`;
                return `<div class="cg-post">
                    ${p.isPinned ? '<div class="cg-post-pinned">📌 Pinned</div>' : ''}
                    <div class="cg-post-badges">${authorBadge}${typeBadge}</div>
                    <h4>${esc(p.title)}</h4>
                    <p>${esc(p.content)}</p>
                    ${p.sourceRefs && p.sourceRefs.length ? '<div class="cg-post-sources">🔗 ' + p.sourceRefs.map(s=>esc(s)).join(' • ') + '</div>' : ''}
                    <div class="cg-post-stats">
                        <span>❤️ ${(p.reactions||[]).length}</span>
                        <span>💬 ${(p.comments||[]).filter(c=>c.status==='published').length}</span>
                        <span>🔖 ${(p.savedBy||[]).length}</span>
                    </div>
                </div>`;
            }).join('') : '<div class="cg-empty">📝 No posts yet. Posts from admin and moderators will appear here.</div>';

            document.getElementById('cgPage').innerHTML = `
                <a href="community.html" class="cg-back">← Back to Community</a>
                <div class="cg-header">
                    <div class="cg-badges">${badges}</div>
                    <h1 class="cg-title">${esc(group.name || group.title)}</h1>
                    <p class="cg-desc">${esc(group.description)}</p>
                    <div class="cg-meta">
                        <span>👥 ${group.memberCount || 0} members</span>
                        ${group.statusBadge ? '<span>⏱️ ' + esc(group.statusBadge) + '</span>' : ''}
                        ${group.commentingEnabled !== undefined ? '<span>' + (group.commentingEnabled ? '💬 Comments On' : '🚫 Comments Off') + '</span>' : ''}
                        ${group.reactionsEnabled !== undefined ? '<span>' + (group.reactionsEnabled ? '❤️ Reactions On' : '') + '</span>' : ''}
                    </div>
                </div>
                ${group.rules ? `<div class="cg-rules"><strong>📋 Group Rules</strong><p>${esc(group.rules)}</p></div>` : ''}
                <button class="cg-join-btn" id="cgJoinBtn">${isCircle ? 'Join Circle' : 'Join Group'}</button>
                <h2 class="cg-posts-title">✍️ Posts (${posts.length})</h2>
                ${postsHtml}
            `;

            // Join handler
            document.getElementById('cgJoinBtn').addEventListener('click', async function() {
                if (!token) { alert('Log in to join'); return; }
                this.disabled = true; this.textContent = 'Joining...';
                const url = isCircle ? '/api/community/circles/' + id + '/join' : '/api/community/official-groups/' + id + '/join';
                try {
                    const r = await fetch(url, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
                    const d = await r.json();
                    this.textContent = '✓ Joined';
                    this.style.background = '#10B981';
                } catch(e) { this.disabled = false; this.textContent = isCircle ? 'Join Circle' : 'Join Group'; }
            });

        } catch(e) { console.error(e); document.getElementById('cgPage').innerHTML = '<a href="community.html" class="cg-back">← Back</a><p class="cg-empty">Error loading group</p>'; }
    }

    loadGroup();
    </script>
</body>
</html>
