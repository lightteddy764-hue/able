<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body-Mind Connection - ABLE</title>
    <link rel="stylesheet" href="dashboard-styles.css">
    <link rel="stylesheet" href="body-mind.css">
    <link rel="stylesheet" href="loader.css">
</head>
<body>
    <script src="loader.js"></script>
    <div id="sidebar"></div>
    <script src="sidebar-nav.js"></script>

    <div class="main-content">
        <header class="topbar">
            <button class="menu-toggle" id="menuToggle"><svg viewBox="0 0 24 24" fill="none"><path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            <div class="search-bar"><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><input type="text" placeholder="Search yoga, nutrition, breathing..."></div>
            <div class="topbar-actions"><div class="user-profile"><img src="https://ui-avatars.com/api/?name=User&background=E67E22&color=fff" alt="User"><div class="user-info"><span class="user-name">User</span><span class="user-role">Wellness Seeker</span></div></div></div>
        </header>

        <main class="dashboard-content bm-page">
            <!-- Hero -->
            <div class="bm-hero">
                <div class="bm-hero-left">
                    <h1 id="bmHeroTitle">Build a Stronger Mind & Healthier Body</h1>
                    <p id="bmHeroSubtitle">Loading...</p>
                    <div class="bm-hero-checks" id="bmHeroChecks"></div>
                    <button class="bm-hero-btn" onclick="scrollToEl('programs')">Start Today's Wellness Plan</button>
                </div>
                <div class="bm-hero-right">
                    <div class="bm-progress-ring">
                        <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8"/><circle id="progressCircle" cx="50" cy="50" r="42" fill="none" stroke="#10B981" stroke-width="8" stroke-dasharray="264" stroke-dashoffset="264" stroke-linecap="round" transform="rotate(-90 50 50)"/></svg>
                        <div class="bm-ring-text"><span id="ringPct">0%</span><small>Today</small></div>
                    </div>
                    <div class="bm-progress-items" id="bmProgressItems"></div>
                </div>
            </div>

            <!-- Today's Recommendation -->
            <div class="bm-rec-card" id="bmRecCard">
                <div class="bm-rec-badge">Recommended For You</div>
                <div class="bm-rec-body" id="bmRecBody"><p style="color:#9CA3AF">Loading recommendation...</p></div>
            </div>

            <!-- Active Programs -->
            <section id="programs" class="bm-section">
                <div class="bm-sec-header-graphic">
                    <h2 class="bm-sec-title">Your Active Programs</h2>
                    <img src="/images/bodymind-programs-workout.svg" alt="" class="bm-sec-graphic">
                </div>
                <div class="bm-programs-grid" id="bmPrograms"><div class="bm-skeleton" style="height:200px;border-radius:16px"></div></div>
            </section>

            <!-- Category Tabs -->
            <div class="bm-pills" id="bmPills"></div>

            <!-- Sessions Grid -->
            <section class="bm-section" id="bmSessionsSection">
                <h2 class="bm-sec-title" id="bmSessionsTitle">All Sessions</h2>
                <div class="bm-sessions-grid" id="bmSessions"><div class="bm-skeleton" style="height:150px;border-radius:12px"></div></div>
            </section>

            <!-- Habit Tracker -->
            <section class="bm-section">
                <div class="bm-sec-header-graphic">
                    <h2 class="bm-sec-title">Daily Habit Tracker</h2>
                    <img src="/images/bodymind-habits-todolist.svg" alt="" class="bm-sec-graphic bm-sec-graphic-sm">
                </div>
                <div class="bm-routine-card" id="bmHabits"><p style="color:#9CA3AF">Loading habits...</p></div>
            </section>

            <!-- Guest Prompt -->
            <div id="bmGuestPrompt" style="display:none;text-align:center;padding:2rem;background:white;border-radius:16px;border:1px solid #E5E7EB;margin-top:1rem">
                <p style="font-size:0.9rem;color:#6B7280;margin-bottom:1rem">Log in to save your progress, track habits, and continue programs.</p>
                <a href="login.html" style="padding:0.7rem 1.5rem;background:#E67E22;color:white;border-radius:10px;text-decoration:none;font-weight:600;font-size:0.9rem">Log In</a>
            </div>
        </main>
    </div>

    <!-- Session Modal (injected dynamically) -->
    <div id="sessionModal"></div>

    <!-- Toast -->
    <div id="bmToast" style="position:fixed;bottom:2rem;right:2rem;background:#1a1a2e;color:white;padding:0.85rem 1.5rem;border-radius:10px;font-size:0.85rem;z-index:9999;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none"></div>

    <script src="chatbot.js"></script>
    <script src="dashboard.js"></script>

    <script>
    const token = localStorage.getItem('token');
    let pageData = null;
    let userProgress = null;
    let currentCategory = 'all';

    function scrollToEl(id) { document.getElementById(id)?.scrollIntoView({ behavior:'smooth' }); }
    function showToast(msg) { const t = document.getElementById('bmToast'); t.textContent = msg; t.style.opacity = '1'; t.style.transform = 'translateY(0)'; setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(10px)'; }, 3000); }

    async function loadPage() {
        try {
            const res = await fetch('/api/body-mind');
            pageData = await res.json();
            if (token) {
                const pRes = await fetch('/api/body-mind/progress', { headers: { 'Authorization': 'Bearer ' + token } });
                if (pRes.ok) userProgress = await pRes.json();
            } else {
                document.getElementById('bmGuestPrompt').style.display = 'block';
            }
            render();
        } catch(e) { console.error(e); }
    }

    function render() {
        if (!pageData) return;
        const h = pageData.hero || {};
        document.getElementById('bmHeroTitle').textContent = h.title || 'Body-Mind Connection';
        document.getElementById('bmHeroSubtitle').textContent = h.subtitle || '';
        document.getElementById('bmHeroChecks').innerHTML = (h.checks || []).map(c => `<span>✓ ${c}</span>`).join('');

        renderProgressRing();
        renderRecommendation();
        renderPrograms();
        renderTabs();
        renderSessions();
        renderHabits();
    }

    function renderProgressRing() {
        const todayCompleted = (userProgress?.completedSessions || []).filter(s => new Date(s.completedAt).toDateString() === new Date().toDateString()).length;
        const todayHabits = (userProgress?.todayHabits || []).filter(h => h.completed && new Date(h.date).toDateString() === new Date().toDateString()).length;
        const total = todayCompleted + todayHabits;
        const goal = 5;
        const pct = Math.min(Math.round((total / goal) * 100), 100);
        const offset = 264 - (264 * pct / 100);
        document.getElementById('progressCircle').style.strokeDashoffset = offset;
        document.getElementById('ringPct').textContent = pct + '%';
        // Progress items
        const cats = ['nutrition','yoga','breathing','routine'];
        const completed = cats.map(c => (userProgress?.completedSessions || []).some(s => s.category === c && new Date(s.completedAt).toDateString() === new Date().toDateString()));
        document.getElementById('bmProgressItems').innerHTML = cats.map((c, i) => `<span class="bm-pi ${completed[i] ? 'done' : ''}">${c.charAt(0).toUpperCase()+c.slice(1)} ${completed[i] ? '✔' : '○'}</span>`).join('');
    }

    function renderRecommendation() {
        const r = pageData.todayRecommendation || {};
        document.getElementById('bmRecBody').innerHTML = `
            <div class="bm-rec-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M22 12H18L15 21L9 3L6 12H2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div class="bm-rec-info"><h3>${r.title || 'Daily Wellness Session'}</h3><p>${r.description || ''}</p><div class="bm-rec-meta"><span>${r.duration || '10 min'}</span><span>${r.level || 'Beginner'}</span>${(r.tags||[]).map(t=>'<span>'+t+'</span>').join('')}</div></div>
            <button class="bm-rec-btn" onclick="startFirstSession()">Start Session →</button>
        `;
    }

    function startFirstSession() {
        const breathing = (pageData.sessions || []).find(s => s.category === 'breathing');
        if (breathing) openSession(breathing);
        else showToast('No sessions available');
    }

    function renderPrograms() {
        const programs = pageData.programs || [];
        if (!programs.length) { document.getElementById('bmPrograms').innerHTML = '<p style="color:#9CA3AF;text-align:center;padding:2rem">No programs available</p>'; return; }
        document.getElementById('bmPrograms').innerHTML = programs.map((p, i) => {
            const userProg = (userProgress?.activePrograms || []).find(ap => ap.programId === (p._id || String(i)));
            const day = userProg ? userProg.currentDay : 0;
            const pct = p.totalDays ? Math.round((day / p.totalDays) * 100) : 0;
            return `<div class="bm-program"><div class="bm-prog-header" style="background:linear-gradient(135deg,${p.gradientStart},${p.gradientEnd})"><span class="bm-prog-day">${day > 0 ? 'Day '+day+'/'+p.totalDays : 'Not Started'}</span></div><div class="bm-prog-body"><h4>${p.title}</h4><p>${p.description}</p><div class="bm-prog-bar"><div class="bm-prog-fill" style="width:${pct}%"></div></div><span class="bm-prog-pct">${pct}% Complete</span><button class="bm-prog-btn" onclick="startProgram('${p._id||i}','${p.title.replace(/'/g,"\\'")}')">${day > 0 ? 'Continue →' : 'Start →'}</button></div></div>`;
        }).join('');
    }

    function renderTabs() {
        const categories = [...new Set((pageData.sessions || []).map(s => s.category))];
        document.getElementById('bmPills').innerHTML = '<button class="bm-pill active" onclick="filterSessions(\'all\')">All</button>' + categories.map(c => `<button class="bm-pill" onclick="filterSessions('${c}')">${c.charAt(0).toUpperCase()+c.slice(1)}</button>`).join('');
    }

    function filterSessions(cat) {
        currentCategory = cat;
        document.querySelectorAll('.bm-pill').forEach(p => p.classList.remove('active'));
        event.target.classList.add('active');
        renderSessions();
    }

    function renderSessions() {
        let sessions = (pageData.sessions || []).filter(s => s.isActive !== false);
        if (currentCategory !== 'all') sessions = sessions.filter(s => s.category === currentCategory);
        document.getElementById('bmSessionsTitle').textContent = currentCategory === 'all' ? 'All Sessions' : currentCategory.charAt(0).toUpperCase() + currentCategory.slice(1) + ' Sessions';
        if (!sessions.length) { document.getElementById('bmSessions').innerHTML = '<p style="color:#9CA3AF;text-align:center;padding:2rem">No sessions in this category</p>'; return; }
        document.getElementById('bmSessions').innerHTML = sessions.map(s => {
            const fallback = `background:linear-gradient(135deg,${s.gradientStart},${s.gradientEnd})`;
            const bgImg = s.image
                ? `<img class="bm-sess-bg" src="${s.image}" alt="${s.title}" loading="lazy">`
                : '';
            return `
            <div class="bm-session" style="${s.image ? '' : fallback}">
                ${bgImg}
                <div class="bm-sess-scrim"></div>
                <img src="/images/pattern-leaf-branch.svg" alt="" class="bm-sess-pattern">
                <div class="bm-sess-body">
                    <span class="bm-sess-tag">${s.level}</span>
                    <h4>${s.title}</h4>
                    <div class="bm-sess-meta"><span>${s.duration} min</span><span>${s.category}</span>${(s.tags||[]).map(t=>'<span>✓ '+t+'</span>').join('')}</div>
                    <button class="bm-sess-btn" onclick='openSession(${JSON.stringify(s).replace(/'/g,"&#39;")})'>Start Session</button>
                </div>
            </div>`;
        }).join('');
    }

    function renderHabits() {
        const habits = pageData.habits || [];
        if (!habits.length) return;
        const todayStr = new Date().toDateString();
        document.getElementById('bmHabits').innerHTML = '<div class="bm-habits-list">' + habits.map(h => {
            const done = (userProgress?.todayHabits || []).some(th => th.habitTitle === h.title && th.completed && new Date(th.date).toDateString() === todayStr);
            return `<label class="bm-habit-item ${done?'done':''}"><input type="checkbox" ${done?'checked':''} onchange="toggleHabit('${h.title.replace(/'/g,"\\'")}', this.checked)"><span>${h.icon || '✓'} ${h.title}</span></label>`;
        }).join('') + '</div>';
    }

    // ===== ACTIONS =====
    async function toggleHabit(title, completed) {
        if (!token) { localStorage.setItem('bm_habit_' + title, completed); showToast(completed ? '✓ ' + title : 'Unchecked'); renderProgressRing(); return; }
        try {
            await fetch('/api/body-mind/habit', { method: 'PUT', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify({ habitTitle: title, completed }) });
            // Update local progress
            if (!userProgress) userProgress = { todayHabits: [], completedSessions: [] };
            const today = new Date(); today.setHours(0,0,0,0);
            const existing = userProgress.todayHabits.find(h => h.habitTitle === title && new Date(h.date).toDateString() === today.toDateString());
            if (existing) existing.completed = completed;
            else userProgress.todayHabits.push({ habitTitle: title, completed, date: today });
            renderProgressRing();
            showToast(completed ? '✓ ' + title + ' completed!' : 'Habit unchecked');
        } catch(e) { showToast('Failed to save'); }
    }

    async function startProgram(programId, title) {
        if (!token) { showToast('Log in to start programs'); return; }
        try {
            const res = await fetch('/api/body-mind/program/' + programId + '/start', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify({ programTitle: title }) });
            const data = await res.json();
            showToast('🏋️ ' + (data.message || 'Program started!'));
            if (data.progress) userProgress = data.progress;
            renderPrograms();
        } catch(e) { showToast('Failed to start program'); }
    }

    function openSession(session) {
        const steps = session.steps || [];
        let content = '';

        if (session.category === 'breathing') {
            content = `
                <div style="text-align:center;margin-bottom:1.5rem"><span style="font-size:3rem">${session.icon||'🫁'}</span></div>
                <h3 style="text-align:center;font-size:1.3rem;font-weight:700;margin-bottom:0.5rem">${session.title}</h3>
                <p style="text-align:center;color:#6B7280;font-size:0.85rem;margin-bottom:1.5rem">${session.description || ''}</p>
                <div id="breathTimer" style="text-align:center;font-size:2.5rem;font-weight:800;color:#E67E22;margin:1.5rem 0">Ready</div>
                <div style="margin:1rem 0">${steps.map((s,i) => '<div style="display:flex;gap:0.75rem;padding:0.6rem 0;border-bottom:1px solid #F3F4F6;font-size:0.85rem"><span style="background:rgba(222,116,37,0.1);color:#E67E22;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0">'+(i+1)+'</span><span>'+s+'</span></div>').join('')}</div>
                <button onclick="startBreathingTimer()" style="width:100%;padding:0.8rem;background:#E67E22;color:white;border:none;border-radius:10px;font-weight:700;cursor:pointer;margin-bottom:0.5rem">Begin Breathing</button>
            `;
        } else {
            content = `
                <div style="text-align:center;margin-bottom:1.5rem"><span style="font-size:3rem">${session.icon||'🧘'}</span></div>
                <h3 style="text-align:center;font-size:1.3rem;font-weight:700;margin-bottom:0.5rem">${session.title}</h3>
                <p style="text-align:center;color:#6B7280;font-size:0.85rem;margin-bottom:0.5rem">${session.description || ''}</p>
                <div style="text-align:center;font-size:0.75rem;color:#9CA3AF;margin-bottom:1.5rem">${session.duration} min • ${session.level} • ${session.category}</div>
                <div style="margin:1rem 0">${steps.map((s,i) => '<div style="display:flex;gap:0.75rem;padding:0.6rem 0;border-bottom:1px solid #F3F4F6;font-size:0.85rem"><span style="background:rgba(222,116,37,0.1);color:#E67E22;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0">'+(i+1)+'</span><span>'+s+'</span></div>').join('')}</div>
            `;
        }
        content += `<button onclick="completeSession('${session._id||''}','${(session.title||'').replace(/'/g,"\\'")}','${session.category}')" style="width:100%;padding:0.8rem;background:#10B981;color:white;border:none;border-radius:10px;font-weight:700;cursor:pointer;margin-top:0.5rem">✓ Mark Complete</button>`;

        document.getElementById('sessionModal').innerHTML = `
            <div style="position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem" onclick="if(event.target===this)closeSession()">
                <div style="background:white;border-radius:20px;padding:2rem;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.2)">
                    <button onclick="closeSession()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.3rem;cursor:pointer;color:#9CA3AF">✕</button>
                    ${content}
                </div>
            </div>
        `;
    }

    function closeSession() { document.getElementById('sessionModal').innerHTML = ''; }

    function startBreathingTimer() {
        const timer = document.getElementById('breathTimer');
        const phases = ['Inhale...', 'Hold...', 'Exhale...', 'Hold...'];
        const durations = [4, 7, 8, 4];
        let cycle = 0, phase = 0, count = durations[0];
        timer.textContent = phases[0] + ' ' + count;
        const interval = setInterval(() => {
            count--;
            if (count <= 0) { phase++; if (phase >= phases.length) { cycle++; phase = 0; if (cycle >= 3) { clearInterval(interval); timer.textContent = '✓ Complete!'; timer.style.color = '#10B981'; return; } } count = durations[phase]; }
            timer.textContent = phases[phase] + ' ' + count;
        }, 1000);
    }

    async function completeSession(sessionId, title, category) {
        closeSession();
        if (!token) { showToast('✓ ' + title + ' completed! Log in to save.'); return; }
        try {
            await fetch('/api/body-mind/session/' + (sessionId || 'unknown') + '/complete', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionTitle: title, category }) });
            if (!userProgress) userProgress = { completedSessions: [], todayHabits: [] };
            userProgress.completedSessions.push({ sessionId, sessionTitle: title, category, completedAt: new Date() });
            renderProgressRing();
            showToast('🎉 ' + title + ' completed!');
        } catch(e) { showToast('Saved locally'); }
    }

    loadPage();
    </script>
</body>
</html>
